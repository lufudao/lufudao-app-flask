<script>
var u = localStorage.getItem('user');

if (u == null) {
    alert("欢迎使用路辅导");
    confirm("马上开始注册");

    var username = prompt("用户名", "USERLFD");
    localStorage.setItem("user", username);

    var password = prompt("密码", "48526");
    localStorage.setItem("passwd", password);

    var gender = prompt("性别", "男");
    localStorage.setItem("gender", gender);

    var birthday = prompt("生日", "1月1日");
    localStorage.setItem("birthday", birthday);

    var grade = prompt("年级1-9", "6");
    localStorage.setItem("grade", grade);

    var phone = prompt("电话", "12345678901");
    localStorage.setItem("phone", phone);

    var email = prompt("电子邮箱", "123@abc.com");
    localStorage.setItem("email", email);

    var time = new Date();
    localStorage.setItem("create", time.toLocaleString());

    localStorage.setItem('money', 20);
    localStorage.setItem('last', time.toLocaleString());
    localStorage.setItem('status', '正常');
    var uid = Math.floor(Math.random() * 100000); 
    localStorage.setItem('userid', uid);
    localStorage.setItem('save', '0');
    alert("已注册完成，请重启应用完成登录");
} else {
    while (true) {
        var pwd = prompt("密码");
        var password = localStorage.getItem("passwd");
        if (pwd === password) {
            var time = new Date();
            localStorage.setItem("last", time.toLocaleString());

            var money = localStorage.getItem("money");
            var username = localStorage.getItem("user");
            var gender = localStorage.getItem("gender");
            var birthday = localStorage.getItem("birthday");
            var grade = localStorage.getItem("grade");
            var phone = localStorage.getItem("phone");
            var email = localStorage.getItem("email");
            var uid = localStorage.getItem("userid");
            var createTime = localStorage.getItem("create"); // 避免time变量重复覆盖

            // 移除所有DOM判断if，直接赋值（确认有对应ID）
            document.getElementById("user1").innerHTML = "hello,"+username;
            document.getElementById("user2").innerHTML = username;
            document.getElementById("gender").innerHTML = gender;
            document.getElementById("birthday").innerHTML = birthday;
            document.getElementById("grade").innerHTML = grade;
            document.getElementById("phone").innerHTML = phone;
            document.getElementById("email").innerHTML = email;
            document.getElementById("create").innerHTML = createTime;
            document.getElementById("last").innerHTML = time.toLocaleString();
            document.getElementById("uid").innerHTML = uid;
            document.getElementById("money").innerHTML = money;

            alert("欢迎" + username);
            break; 
        } else {
            alert("密码错误");
        }
    }
}

function newf(){
    alert("已加载完成");
    document.getElementById('html').value = "";
}

function save(){
    var name = prompt("项目名称","newfile");
    var html = document.getElementById('html').value;
    localStorage.setItem(name, html);
    alert("保存成功");
}

function set(){
    var set = prompt("1.字体大小 2.字体颜色 3.文本框大小");
    if(set === "1"){
        var fontsize = prompt("字体大小（数字）");
        try{
            var fontsize = parseInt(fontsize);
            document.getElementById('html').style.fontSize = fontsize + "px";
        }catch(e){
            alert("请输入数字");
        }
    } else if(set === "2"){
        var color = prompt("输入颜色:如#aaaaaa");
        document.getElementById('html').style.color = color;
    } else if(set === "3"){
        var height = prompt("行数");
        var width = prompt("列数");
        document.getElementById('html').cols = width;
        document.getElementById('html').rows = height;
    } else {
        alert("请输入123");
    }
}

function debug(){
    var file = document.getElementById('html').value;
    document.getElementById("htmloutput").innerHTML = file;
}

function openFile(){
    var id = prompt("输入项目名");
    try{
        var h5 = localStorage.getItem(id);
        document.getElementById("html").value = h5;
    }catch(e){
        alert("无此项目");
    }
}

function del(){
    var del = prompt("删除的项目名");
    try{
        localStorage.removeItem(del);
        alert("已删除该项目");
    }catch(e){
        alert("无此项目");
    }
}
function find(){
    var url = document.getElementById('html5').value;
    var outputurl = document.getElementById("url");
    outputurl.src = "https://www.baidu.com/s?wd=" + url;
    alert("小路已加载到:" + url);
}
</script>
